name: mobile
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  # =========================
  # Flutter SDK
  # =========================
  flutter:
    sdk: flutter

  # =========================
  # State Management
  # =========================
  provider: ^6.0.5

  # =========================
  # Networking & APIs
  # =========================
  http: ^1.1.2
  dio: ^5.3.0
  connectivity_plus: ^5.0.2
  web_socket_channel: ^2.2.0

  # =========================
  # Media (Camera, Audio, Video)
  # =========================
  camera: ^0.11.2
  image_picker: ^1.1.2
  audioplayers: ^6.1.0
  video_player: ^2.9.1

  # =========================
  # File System & Storage
  # =========================
  path_provider: ^2.1.4
  shared_preferences: ^2.2.3

  # =========================
  # Location & Maps
  # =========================
  geolocator: ^13.0.2
  google_maps_flutter: ^2.5.3
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_map_heatmap: ^0.0.6
  flutter_map_tile_caching: ^10.0.0
  flutter_typeahead: ^5.2.0

  # =========================
  # Device & Sensors
  # =========================
  wakelock_plus: ^1.2.8
  proximity_sensor: ^1.3.3
  battery_plus: ^5.0.3
  permission_handler: ^12.0.1

  # =========================
  # UI / UX Enhancements
  # =========================
  google_fonts: ^6.1.0
  badges: ^3.0.0
  shimmer: ^3.0.0
  flutter_markdown: ^0.7.3
  url_launcher: ^6.1.12

  # =========================
  # Localization & Formatting
  # =========================
  intl: ^0.19.0

  # =========================
  # Firebase & Notifications
  # =========================
  firebase_core: ^3.3.0
  firebase_messaging: ^15.0.3
  flutter_local_notifications: ^17.2.2
  local_auth: ^2.3.0

  # =========================
  # App Branding & Splash
  # =========================
  flutter_native_splash: ^2.4.7

  share_plus: ^7.2.1
  app_links: ^3.4.3
  record: ^6.2.0


flutter_native_splash:
  color: "#F5F5F5"
  image: assets/logo.png
  android: true
  ios: true


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/animations/
    - assets/animations/safety.json
    - assets/sounds/ringtone.mp3

