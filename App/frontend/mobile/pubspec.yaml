name: mobile
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  # Required packages
  provider: ^6.0.5
  http: ^1.1.2
  camera: ^0.11.2
  path_provider: ^2.1.4
  shared_preferences: ^2.2.3
  geolocator: ^13.0.2
  audioplayers: ^6.1.0
  video_player: ^2.9.1
  wakelock_plus: ^1.2.8
  proximity_sensor: ^1.3.3
#  permission_handler: ^11.3.1
  intl: ^0.19.0
#  shared_preferences: ^2.2.0
  google_fonts: ^6.1.0
  badges: ^3.0.0
  url_launcher: ^6.1.12
  permission_handler: ^12.0.1
  connectivity_plus: ^5.0.2
  # For skeleton loading
  shimmer: ^3.0.0
  # For better HTTP
  dio: ^5.3.0
  firebase_core: ^3.3.0
  firebase_messaging: ^15.0.3
  flutter_local_notifications: ^17.2.2
  flutter_native_splash: ^2.4.7

  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_map_heatmap: ^0.0.6
  flutter_map_tile_caching: ^10.0.0
#  geolocator: ^12.0.0

flutter_native_splash:
  color: "#000000"
  image: assets/logo.png
  android: true
  ios: true


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/animations/
    - assets/animations/safety.json
    - assets/sounds/ringtone.mp3

